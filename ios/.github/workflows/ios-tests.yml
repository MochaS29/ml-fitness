name: iOS Unit Tests

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]
  schedule:
    # Every Monday at 9:00 AM Eastern (14:00 UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch: # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Unit Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available | grep -E "iPhone 1[5-9]|iPhone 2" | head -10

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Run unit tests
        run: |
          xcodebuild test \
            -scheme HealthTracker \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -skip-testing:HealthTrackerUITests \
            -resultBundlePath TestResults.xcresult \
            2>&1 | xcpretty --color --report junit --output test-results.xml
          exit ${PIPESTATUS[0]}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            TestResults.xcresult
            test-results.xml
          retention-days: 14

      - name: Report test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' test-results.xml | head -1 | grep -o '[0-9]*' || echo "unknown")
            FAILURES=$(grep -o 'failures="[0-9]*"' test-results.xml | head -1 | grep -o '[0-9]*' || echo "0")
            echo "- Total: $TESTS" >> $GITHUB_STEP_SUMMARY
            echo "- Failures: $FAILURES" >> $GITHUB_STEP_SUMMARY
          else
            echo "- No test results file found" >> $GITHUB_STEP_SUMMARY
          fi
